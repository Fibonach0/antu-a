<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página no encontrada — AntuñA</title>
<meta name="robots" content="noindex">
<link rel="icon" href="/assets/img/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#000; --ink:#F5F5F7; --ink-soft:#86868B; --blue:#2997FF; }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:var(--bg); color:var(--ink); font-family:'Inter',sans-serif; text-align:center; padding:24px;
  }
  .code{font-weight:800; font-size:96px; margin:0; letter-spacing:-0.03em;}
  p{color:var(--ink-soft); font-size:18px; max-width:380px; margin:10px auto 30px;}
  a.btn{
    display:inline-block; background:var(--blue); color:#fff; text-decoration:none;
    font-weight:600; padding:13px 28px; border-radius:980px; font-size:15.5px;
  }
</style>
</head>
<body>
  <div>
    <p class="code">404</p>
    <p>Esta página no existe o se movió. Volvamos a algo que sí funciona.</p>
    <a class="btn" href="/">Volver al inicio</a>
  </div>
</body>
</html>
